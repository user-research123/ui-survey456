        // 处理数据
        const times = [];
        const totalRanks = [];
        const gameRanks = [];

            const timeStr = item.time.replace('点', ':').replace('分', '');
            times.push(timeStr);
            totalRanks.push(item.total ? parseInt(item.total) : null);
            gameRanks.push(item.game ? parseInt(item.game) : null);
        });

        // 创建SVG图表
        function createChart() {
            const container = document.getElementById('chart-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            const padding = { top: 40, right: 60, bottom: 80, left: 80 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // 计算Y轴范围（排名越小越靠上）
            const allValidRanks = [...totalRanks, ...gameRanks].filter(r => r !== null);
            const minRank = Math.min(...allValidRanks);
            const maxRank = Math.max(...allValidRanks);
            const yMin = 0;
            const yMax = Math.ceil(maxRank / 10) * 10;

            // 创建SVG
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.style.width = '100%';
            svg.style.height = '100%';

            // 绘制网格线
            const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            for (let i = yMin; i <= yMax; i += 20) {
                const y = padding.top + ((yMax - i) / (yMax - yMin)) * chartHeight;
                
                // 网格线
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding.left);
                line.setAttribute('y1', y);
                line.setAttribute('x2', width - padding.right);
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#e0e0e0');
                line.setAttribute('stroke-width', '1');
                gridGroup.appendChild(line);

                // Y轴标签
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', padding.left - 10);
                text.setAttribute('y', y + 4);
                text.setAttribute('text-anchor', 'end');
                text.setAttribute('font-size', '12');
                text.setAttribute('fill', '#666');
                text.textContent = i + '名';
                gridGroup.appendChild(text);
            }
            svg.appendChild(gridGroup);

            // 绘制X轴标签
            const xAxisGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            const labelInterval = 12; // 每隔12个点显示一个标签
            for (let i = 0; i < times.length; i += labelInterval) {
                const x = padding.left + (i / (times.length - 1)) * chartWidth;
                const timeParts = times[i].split(' ');
                const datePart = timeParts[0];
                const timePart = timeParts[1] || '';
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', height - padding.bottom + 30);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '11');
                text.setAttribute('fill', '#666');
                text.textContent = datePart + '\\n' + timePart;
                xAxisGroup.appendChild(text);
            }
            svg.appendChild(xAxisGroup);

            // 绘制数据线函数
            function drawLine(data, color, name) {
                const lineGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let pathData = '';
                const points = [];

                data.forEach((value, index) => {
                    if (value !== null) {
                        const x = padding.left + (index / (data.length - 1)) * chartWidth;
                        const y = padding.top + ((yMax - value) / (yMax - yMin)) * chartHeight;
                        points.push({ x, y, value, time: times[index] });

                        if (pathData === '') {
                            pathData = `M ${x} ${y}`;
                        } else {
                            pathData += ` L ${x} ${y}`;
                        }
                    }
                });

                // 绘制线条
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', color);
                path.setAttribute('stroke-width', '2.5');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('stroke-linecap', 'round');
                lineGroup.appendChild(path);

                // 绘制数据点
                points.forEach(point => {
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', point.x);
                    circle.setAttribute('cy', point.y);
                    circle.setAttribute('r', '4');
                    circle.setAttribute('fill', color);
                    circle.setAttribute('stroke', 'white');
                    circle.setAttribute('stroke-width', '2');
                    circle.style.cursor = 'pointer';

                    // 添加悬停事件
                    circle.addEventListener('mouseenter', (e) => showTooltip(e, point.time, name, point.value));
                    circle.addEventListener('mouseleave', hideTooltip);

                    lineGroup.appendChild(circle);
                });

                return lineGroup;
            }

            // 绘制两条线
            svg.appendChild(drawLine(totalRanks, '#5470C6', '总榜(免费)'));
            svg.appendChild(drawLine(gameRanks, '#91CC75', '游戏(免费)'));

            container.appendChild(svg);
        }

        // 显示提示框
        function showTooltip(event, time, seriesName, value) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `<strong>${time}</strong><br/>${seriesName}: 第${value}名`;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY - 30) + 'px';
        }

        // 隐藏提示框
        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'none';
        }

        // 初始化图表
        window.addEventListener('load', createChart);
        window.addEventListener('resize', () => {
            const container = document.getElementById('chart-container');
            container.innerHTML = '<div class="tooltip" id="tooltip"></div>';
            createChart();
        });
