<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮 UI 新版本用户调研</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .description {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .description h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .description p {
            font-size: 15px;
            color: #666;
            margin-bottom: 10px;
        }

        .solutions {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 30px;
        }

        .solution-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }

        .solution-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .solution-header h3 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .solution-body {
            padding: 0;
        }

        .figma-embed {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
        }

        .survey-section {
            background: white;
            padding: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .survey-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .survey-header h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .survey-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .survey-embed {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .figma-embed {
                height: 500px;
            }

            .survey-embed {
                height: 700px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>鸣潮 UI 新版本用户调研</h1>
        </div>

        <div class="description">
            <h2>📋 交易猫《鸣潮》商品列表 UI 升级方案由你来定！</h2>
            <p>为了让找号更高效，我们准备了多套UI设计新方案。请你依次体验三个UI方案（可进行滑动体验），并到下面的问卷选出你的PICK! 全程仅需2分钟，快来参与！</p>
        </div>

        <div class="solutions">
            <div class="solution-card">
                <div class="solution-header">
                    <h3>方案 A</h3>
                </div>
                <div class="solution-body">
                    <iframe 
                        class="figma-embed"
                        src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2FzTu4sW1pfgudvBkVUTDVJ3%2FUntitled%3Fnode-id%3D83-2%26t%3DYNRX2Zpsk22JYSHZ-1"
                        allowfullscreen
                        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads">
                    </iframe>
                </div>
            </div>

            <div class="solution-card">
                <div class="solution-header">
                    <h3>方案 B</h3>
                </div>
                <div class="solution-body">
                    <iframe 
                        class="figma-embed"
                        src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2FzTu4sW1pfgudvBkVUTDVJ3%2FUntitled%3Fnode-id%3D121-70%26t%3DYNRX2Zpsk22JYSHZ-1"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="solution-card">
                <div class="solution-header">
                    <h3>方案 C</h3>
                </div>
                <div class="solution-body">
                    <iframe 
                        class="figma-embed"
                        src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2FzTu4sW1pfgudvBkVUTDVJ3%2FUntitled%3Fnode-id%3D106-4%26t%3DYNRX2Zpsk22JYSHZ-1"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>

        <div class="survey-section">
            <div class="survey-header">
                <h2>📝 用户调研问卷</h2>
                <p>体验完三个方案后，请在下方填写问卷，告诉我们你的选择！</p>
            </div>
            <iframe 
                class="survey-embed"
                src="https://survey.jiaoyimao.com/apps/zhiliao/dnlMx4lMr"
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            <p>感谢你的参与和支持！</p>
        </div>
    </div>
</body>
</html>
