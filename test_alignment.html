<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对齐测试</title>
    <style>
        .competitor-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .competitor-card ul {
            margin-left: 0;
        }

        ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        li {
            margin-bottom: 8px;
            color: #4a5568;
        }

        h3 {
            color: #2d3748;
            margin: 0 0 15px 0;
        }

        h4 {
            color: #5a67d8;
            margin: 15px 0 10px 0;
        }
    </style>
</head>
<body>
    <div class="competitor-card">
        <h3>微博舆情分析（前5页共50条帖子）</h3>
        
        <h4>用户关注点分布</h4>
        <ul>
            <li>社交互动 (18.0%, 9条) - 寻找队友、公会招募等社交需求</li>
            <li>游戏攻略 (12.0%, 6条) - 新手教程、玩法技巧</li>
            <li>游戏资讯 (12.0%, 6条) - 爆料、预告、更新等官方消息</li>
        </ul>

        <h4>核心发现</h4>
        <ul>
            <li>服务类需求明显：代练代肝(10.0%)和道具交易(8.0%)合计占18.0%</li>
            <li>社交属性突出：组队社交类占比18.0%</li>
        </ul>
    </div>
</body>
</html>
